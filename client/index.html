<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>G6 English Proficiency Assessment</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        const hasAnalyticsConfig =
          endpoint &&
          websiteId &&
          !endpoint.includes("%VITE_") &&
          !websiteId.includes("%VITE_");

        if (!hasAnalyticsConfig) return;

        const script = document.createElement("script");
        script.defer = true;
        script.src = `${endpoint.replace(/\/$/, "")}/umami`;
        script.setAttribute("data-website-id", websiteId);
        document.body.appendChild(script);
      })();
    </script>
  </body>

</html>
